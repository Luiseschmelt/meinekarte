<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Leaflet Karte</title>
    
    <!-- Lädt die CSS-Datei direkt aus deinem GitHub-Ordner -->
    <link rel="stylesheet" href="leaflet.css" />
    
    <!-- Lädt die JS-Datei direkt aus deinem GitHub-Ordner -->
    <script src="leaflet.js"></script>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #map {
            width: 80%;
            height: 70vh;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // Karte initialisieren
        const map = L.map('map').setView([51.1657, 10.4515], 6);

        // OpenStreetMap hinzufügen
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Marker hinzufügen
        L.marker([51.1657, 10.4515]).addTo(map)
            .bindPopup('Das ist die Mitte!')
            .openPopup();
    </script>

</body>
</html>
