<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Leaflet Karte</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    
    <style>
        /* Macht die Seite vollflächig */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Zentriertes Kartenfenster mit fester Größe */
        #map {
            width: 80%;
            height: 70vh;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- Das Karten-Element -->
    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com"></script>
    <script>
        // Karte initialisieren (Zentriert auf Deutschland/Europa)
        const map = L.map('map').setView([51.1657, 10.4515], 6);

        // OpenStreetMap Open-Source-Karte hinzufügen
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Optional: Ein Beispiel-Marker in der Mitte
        L.marker([51.1657, 10.4515]).addTo(map)
            .bindPopup('Das ist die Mitte!')
            .openPopup();
    </script>

</body>
</html>
