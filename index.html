<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine zentrierte Karte</title>
    <style>
        /* Macht die Seite vollflächig und zentriert den Inhalt */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Das zentrierte Kartenfenster */
        .karten-fenster {
            width: 80%;
            height: 70vh;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            background-color: #ccc;
        }
        /* Die Karte selbst füllt das Fenster komplett aus */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Ein zentriertes Fenster mit einer eingebetteten OpenStreetMap-Karte -->
    <div class="karten-fenster">
        <iframe src="https://openstreetmap.org"></iframe>
    </div>

</body>
</html>
